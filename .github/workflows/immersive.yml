name: immersive

# Off-device build + preview + render-check for the immersive point-cloud landing page.
# The Android dev box can't run the Vite/Rollup build or Chromium, so this runner does it:
#   1. builds the R3F + Spark app at base=/Test/immersive/ (via VITE_BASE → build AND preview agree)
#   2. boots it in headless WebGL2 (SwiftShader) → screenshot artifact (phone-viewable QA)
#   3. deploys the build to https://primordial.video/Test/immersive/ so the operator can open it
#      on their PHONE'S browser (real mobile GPU = the true QA; the agy CLI has no browser).
# Reuses the existing Test@primordial.video FTP account + the FTP_PASSWORD secret.

on:
  push:
    paths:
      - 'immersive/**'
      - '.github/workflows/immersive.yml'
  workflow_dispatch:

concurrency:
  group: immersive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: immersive
    env:
      # Drives vite.config.js `base` for BOTH `build` and `preview` so the preview URL,
      # the render-check, and the deployed asset paths all line up at /Test/immersive/.
      VITE_BASE: /Test/immersive/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Render check + screenshot
        # Deliberately non-blocking for now: SwiftShader != a real GPU, so a software-GL quirk
        # must not block the phone preview deploy (the operator's phone is the real QA). The
        # screenshot artifact now captures the actual app (base fixed). Flip this off once we've
        # confirmed the render-check passes cleanly in CI.
        continue-on-error: true
        run: |
          npm run preview -- --port 4173 --host 127.0.0.1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:4173/Test/immersive/ >/dev/null && break; sleep 1; done
          npm run render-check -- http://127.0.0.1:4173/Test/immersive/
          CODE=$?
          pkill -f 'vite preview' 2>/dev/null || true
          exit $CODE
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: immersive-dist
          path: immersive/dist
          if-no-files-found: error
      - name: Upload render screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immersive-render
          path: immersive/test/artifacts/immersive.png
          if-no-files-found: warn

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    # Deploy the phone-openable preview on the working branches / main / manual run (not every branch).
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')
    concurrency:
      group: immersive-preview-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: immersive-dist
          path: dist
      - name: Deploy preview via FTPS (→ primordial.video/Test/immersive/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: premium252.web-hosting.com
          username: Test@primordial.video
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ./immersive/
