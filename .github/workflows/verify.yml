name: verify

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Syntax-check all JS modules
        run: |
          set -e
          for f in $(find src test tools -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \)); do
            node --check "$f"
          done

      - name: Smoke test (params / looks / store)
        run: node test/smoke.mjs

      - name: Site audit (no AI tells / fingerprints in the deployed surface)
        run: node tools/audit-site.mjs

      - name: Docs (encyclopedia + tree) up to date
        run: node tools/gen-docs.mjs --check

      - name: Eval-skills Tier-1 static gate
        run: node tools/eval-skills.mjs

      - name: Eval-skills unit tests
        run: node --test test/eval-skills.test.mjs

      - name: RAG index up to date
        run: node tools/rag/build-index.mjs --check

      - name: Install Playwright Chromium
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Headless render check
        run: node test/render-check.mjs

      - name: Validate shaders (headless WebGL2)
        run: node tools/mcp/lib/validate.mjs

      - name: MCP server self-test
        run: node tools/mcp/selftest.mjs

      - name: RAG tests (chunker / embedder / retriever)
        run: node --test test/rag.test.mjs

      - name: MCP lib tests (state / catalog)
        run: node --test test/state.test.mjs test/catalog.test.mjs

      - name: Upload render screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-screenshot
          path: test/artifacts/render.png
          if-no-files-found: ignore
