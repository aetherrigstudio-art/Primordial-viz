name: deploy

# Auto-deploy the static site to the TEST folder on primordial.video over FTPS,
# using the dedicated Test@primordial.video FTP account (jailed to its own
# folder). Runs on push to the working branch or a manual / GitHub-MCP trigger.
# The live homepage is never touched — files land in that account's folder,
# served at https://primordial.video/Test/.
#
# Requires three repository SECRETS (Settings → Secrets and variables → Actions):
#   FTP_HOST      premium252.web-hosting.com   (the cPanel server hostname)
#   FTP_USERNAME  Test@primordial.video
#   FTP_PASSWORD  the password set on that FTP account
# FTPS is encrypted; never commit these values.

on:
  push:
    branches: [claude/review-claude-md-di5jvm]
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage the static site
        run: |
          mkdir -p site
          cp -R index.html three.html src vendor site/
          cp deploy/.htaccess site/.htaccess

      - name: Upload to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./site/
          # The Test FTP account is jailed to its own folder, so its root IS the
          # target — upload to "./".
          server-dir: ./
